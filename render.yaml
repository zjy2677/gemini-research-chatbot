services:
  - type: web
    name: gemini-research-chatbot-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
